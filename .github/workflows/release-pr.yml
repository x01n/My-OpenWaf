name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '目标版本号，例如 1.2.3；留空则自动提升 patch'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Go formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "::error::Go files are not formatted"
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test -v ./...

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build application
        run: ./scripts/build.sh

  release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    needs: [verify]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve next version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "::error::Invalid version: $INPUT_VERSION"
              exit 1
            fi
          else
            latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [ -z "$latest" ]; then
              VERSION="0.1.0"
            else
              base="${latest#v}"
              major="${base%%.*}"
              rest="${base#*.}"
              minor="${rest%%.*}"
              patch="${rest#*.}"
              patch="${patch%%-*}"
              VERSION="${major}.${minor}.$((patch + 1))"
            fi
          fi
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag already exists: $TAG"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B release/${{ steps.version.outputs.tag }}

      - name: Write release metadata
        run: |
          cat > .release.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "tag": "${{ steps.version.outputs.tag }}",
            "commit": "${{ github.sha }}"
          }
          EOF
          git add .release.json
          git commit -m "chore: prepare release ${{ steps.version.outputs.tag }}" || true

      - name: Push release branch
        run: git push --force-with-lease origin release/${{ steps.version.outputs.tag }}

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="release: ${{ steps.version.outputs.tag }}"
          body=$(printf '%s\n\n%s' \
            "自动发布 PR。合并后将创建 tag ${{ steps.version.outputs.tag }}，并上传 GitHub Release 多平台构建产物。" \
            "源提交：${{ github.sha }}")
          if gh pr view release/${{ steps.version.outputs.tag }} --base main --json number >/tmp/pr.json 2>/dev/null; then
            number="$(jq -r .number /tmp/pr.json)"
            gh pr edit "$number" --title "$title" --body "$body"
          else
            gh pr create --base main --head release/${{ steps.version.outputs.tag }} --title "$title" --body "$body"
          fi
