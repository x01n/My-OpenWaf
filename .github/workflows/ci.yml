name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Go test
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "::error::Go files are not formatted"
            echo "$files"
            exit 1
          fi

      - name: Download frontend export
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: internal/core/adminweb/dist

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test -v ./...

  frontend-test:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Upload frontend export
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out
          if-no-files-found: error

  full-build:
    name: Full application build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend export
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: internal/core/adminweb/dist

      - name: Build application
        run: |
          go mod tidy
          go build -o bin/my-openwaf ./cmd/...

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: my-openwaf-linux-amd64
          path: bin/my-openwaf
          if-no-files-found: error
