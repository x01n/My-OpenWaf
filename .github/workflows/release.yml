name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-meta:
    name: Release metadata
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${PR_HEAD_REF#release/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" || true
          git push origin "$TAG" || true

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [release-meta]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-meta.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend export
        working-directory: frontend
        run: bun run build

      - name: Embed frontend export
        run: |
          rm -rf internal/core/adminweb/dist
          cp -r frontend/out internal/core/adminweb/dist

      - name: Download Go modules
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist/package
          output="my-openwaf-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "dist/package/$output" ./cmd
          cp README.md LICENSE dist/package/

      - name: Package tar.gz
        if: matrix.goos != 'windows'
        run: |
          name="my-openwaf-${{ needs.release-meta.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p dist/artifacts
          tar -C dist/package -czf "dist/artifacts/${name}.tar.gz" .
          sha256sum "dist/artifacts/${name}.tar.gz" > "dist/artifacts/${name}.tar.gz.sha256"

      - name: Package zip
        if: matrix.goos == 'windows'
        run: |
          name="my-openwaf-${{ needs.release-meta.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p dist/artifacts
          (cd dist/package && zip -r "../artifacts/${name}.zip" .)
          sha256sum "dist/artifacts/${name}.zip" > "dist/artifacts/${name}.zip.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-openwaf-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [release-meta, build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: My-OpenWaf ${{ needs.release-meta.outputs.version }}
          prerelease: ${{ needs.release-meta.outputs.is_prerelease }}
          generate_release_notes: true
          files: dist/release/*
